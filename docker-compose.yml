version: '3.9'

  services:
  app:
    build: .
          ports:
      - "8080:8080"
            environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/expenses
      - SPRING_DATASOURCE_USERNAME=expenseuser
              - SPRING_DATASOURCE_PASSWORD=expensepass
              - SPRING_JPA_HIBERNATE_DDL_AUTO=update
            depends_on:
      db:
        condition: service_healthy
              networks:
      - expense-net

          db:
    image: postgres:16-alpine
          environment:
      POSTGRES_DB: expenses
              POSTGRES_USER: expenseuser
                      POSTGRES_PASSWORD: expensepass
                            ports:
      - "5432:5432"
            volumes:
      - postgres_data:/var/lib/postgresql/data
            healthcheck:
      test: ["CMD-SHELL", "pg_isready -U expenseuser -d expenses"]
      interval: 10s
              timeout: 5s
                      retries: 5
                            networks:
      - expense-net

        volumes:
  postgres_data:

networks:
  expense-net:
    driver: bridge
